<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter</title>
  <script defer src="script.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-slate-100 to-slate-200">

  <div class="bg-white w-96 p-10 rounded-3xl shadow-2xl text-center">

    <h2 class="text-xl font-semibold text-yellow-500 mb-6">Counter</h2>

    <div id="counter"
         class="text-7xl font-bold text-yellow-500 transition-all duration-300">0
    </div>

    <p id="status" class="text-sm text-gray-500 mt-2 h-5"></p>

    <div class="flex justify-center gap-6 mt-8">
      <button id="decrease"
        class="w-14 h-14 rounded-full bg-red-500 text-white text-2xl shadow-md hover:bg-red-600 active:scale-95 transition-all duration-200 disabled:opacity-40">–</button>

      <button id="increase"
        class="w-14 h-14 rounded-full bg-green-500 text-white text-2xl shadow-md hover:bg-green-600 active:scale-95 transition-all duration-200">+</button>
    </div>

    <button id="reset"
      class="mt-8 w-full py-3 rounded-xl bg-blue-500 text-white font-medium shadow-md hover:bg-yellow active:scale-95 transition-all duration-200">Reset</button>

  </div>

</body>
</html>
